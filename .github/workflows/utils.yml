name: Utils

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  test-get-logs:
    name: Test getLotsRetryHelper
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: 
        viem-version: ['1', '2']
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: latest
          package-manager-cache: false

      - name: Set up pnpm
        shell: bash
        run: |
          npm install --global --prefix "$RUNNER_TEMP/setup-pnpm" pnpm@9.10.0
          echo "$RUNNER_TEMP/setup-pnpm/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - run: pnpm add -D -w viem@${{ matrix.viem-version }}

      - name: Test
        run:  pnpm --filter utils test src/_test 
        env:
          RPC_URL_ALCHEMY_1: ${{ secrets.RPC_URL_ALCHEMY_1 }}
          RPC_URL_INFURA_1: ${{ secrets.RPC_URL_INFURA_1 }}
          RPC_URL_QUICKNODE_1: ${{ secrets.RPC_URL_QUICKNODE_1 }}
